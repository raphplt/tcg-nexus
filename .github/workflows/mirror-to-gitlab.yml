name: Mirror to GitLab

on:
  workflow_dispatch: {}
  # push:
  #   branches:
  #     - '**'
  #   tags:
  #     - '*'

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      GITLAB_MIRROR_URL: https://rendu-git.etna-alternance.net/module-10020/activity-53631/group-1056981.git
      GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate GitLab credentials
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            echo "GITLAB_TOKEN is missing. Create a GitLab personal access token or deploy token with write_repository access, then add it as a GitHub secret."
            exit 1
          fi

      - name: Set Git user
        run: |
          git config user.name  "Mirror Bot"
          git config user.email "mirror-bot@example.com"

      - name: Add GitLab remote
        run: |
          gitlab_username="${GITLAB_USERNAME:-oauth2}"
          git remote add gitlab \
            "https://${gitlab_username}:${GITLAB_TOKEN}@${GITLAB_MIRROR_URL#https://}"

      - name: Push all branches to GitLab
        run: |
          git push --all gitlab --force
          
          git branch -r --format='%(refname:short)' | grep '^gitlab/' | sed 's/gitlab\///' | while read branch; do
            if ! git show-ref --verify --quiet refs/heads/$branch; then
              # Only delete if it's not the default branch (main/master)
              if [ "$branch" != "main" ] && [ "$branch" != "master" ]; then
                git push gitlab --delete "$branch" || true
              fi
            fi
          done

      - name: Push all tags to GitLab
        run: git push --tags gitlab --force
