services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: tcg-nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-tcg_nexus}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - tcg-nexus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  vision:
    build:
      context: ./vision
      dockerfile: Dockerfile
    container_name: tcg-nexus-vision
    restart: unless-stopped
    environment:
      OMP_THREAD_LIMIT: "1"
    ports:
      - "8000:8000"
    networks:
      - tcg-nexus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  tcg-nexus-network:
    driver: bridge
